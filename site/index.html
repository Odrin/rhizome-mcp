<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="rhizome-mcp documentation for local-first MCP task tracking and coordination."
    />
    <title>rhizome-mcp docs</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/themes/vue.css"
    />
    <link rel="stylesheet" href="./assets/theme.css" />
    <script>
      window.$docsify = {
        el: '#app',
        loadSidebar: true,
        subMaxLevel: 3,
        auto2top: true,

          noData: 'No matching results.',
          placeholder: 'Search'

      };
    </script>
  </head>
  <body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>

  </body>
</html>
