name: Release binaries

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-release-assets:
    name: Build release assets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: tar.gz
          - goos: linux
            goarch: arm64
            ext: tar.gz
          - goos: darwin
            goarch: amd64
            ext: tar.gz
          - goos: darwin
            goarch: arm64
            ext: tar.gz
          - goos: windows
            goarch: amd64
            ext: zip
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BIN_BASE="rhizome-mcp"
          BIN_NAME="$BIN_BASE"
          if [ "$GOOS" = "windows" ]; then
            BIN_NAME="${BIN_BASE}.exe"
          fi
          ASSET_BASE="${BIN_BASE}_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p dist
          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -ldflags "-s -w" -o "dist/${BIN_NAME}" .
          if [ "${{ matrix.ext }}" = "zip" ]; then
            (cd dist && zip -q "${ASSET_BASE}.zip" "${BIN_NAME}")
            FILE="dist/${ASSET_BASE}.zip"
          else
            (cd dist && tar -czf "${ASSET_BASE}.tar.gz" "${BIN_NAME}")
            FILE="dist/${ASSET_BASE}.tar.gz"
          fi
          shasum -a 256 "$FILE" | awk '{print $1}' > "${FILE}.sha256"
          rm -f "dist/${BIN_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*
          if-no-files-found: error
          retention-days: 1

  upload-release-assets:
    name: Upload release assets
    needs:
      - build-release-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          VERSION="${TAG#v}"
          expected=(
            "rhizome-mcp_${VERSION}_linux_amd64.tar.gz"
            "rhizome-mcp_${VERSION}_linux_amd64.tar.gz.sha256"
            "rhizome-mcp_${VERSION}_linux_arm64.tar.gz"
            "rhizome-mcp_${VERSION}_linux_arm64.tar.gz.sha256"
            "rhizome-mcp_${VERSION}_darwin_amd64.tar.gz"
            "rhizome-mcp_${VERSION}_darwin_amd64.tar.gz.sha256"
            "rhizome-mcp_${VERSION}_darwin_arm64.tar.gz"
            "rhizome-mcp_${VERSION}_darwin_arm64.tar.gz.sha256"
            "rhizome-mcp_${VERSION}_windows_amd64.zip"
            "rhizome-mcp_${VERSION}_windows_amd64.zip.sha256"
          )

          files=()
          for name in "${expected[@]}"; do
            path="dist/${name}"
            if [ ! -f "$path" ]; then
              echo "Missing expected release asset: $path" >&2
              exit 1
            fi
            files+=("$path")
          done

          actual_files=(dist/*)
          if [ "${#actual_files[@]}" -ne 10 ]; then
            echo "Expected 10 files in dist, found ${#actual_files[@]}" >&2
            exit 1
          fi

          echo "Collected release assets:"
          for file in "${files[@]}"; do
            echo " - ${file}"
          done

          gh release upload "$TAG" "${files[@]}" --clobber

