name: Release binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to (re)publish the VS Code extension for (e.g. v1.0.0-beta.3). Only re-runs the Marketplace publish, not the binary build/upload path.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-release-assets:
    name: Build release assets
    # workflow_dispatch is a fallback to (re)publish the VS Code extension
    # only (see publish-vscode-extension below) — it must not rebuild or
    # re-upload binaries. Everything else in this file depends on this job
    # (directly or transitively) and cascades to "skipped" automatically.
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: tar.gz
          - goos: linux
            goarch: arm64
            ext: tar.gz
          - goos: darwin
            goarch: amd64
            ext: tar.gz
          - goos: darwin
            goarch: arm64
            ext: tar.gz
          - goos: windows
            goarch: amd64
            ext: zip
          - goos: windows
            goarch: arm64
            ext: zip
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BIN_BASE="rhizome-mcp"
          BIN_NAME="$BIN_BASE"
          if [ "$GOOS" = "windows" ]; then
            BIN_NAME="${BIN_BASE}.exe"
          fi
          ASSET_BASE="${BIN_BASE}_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p dist
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${{ github.sha }} -X main.date=${BUILD_DATE}"
          CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -ldflags "${LDFLAGS}" -o "dist/${BIN_NAME}" .
          if [ "${{ matrix.ext }}" = "zip" ]; then
            (cd dist && zip -q "${ASSET_BASE}.zip" "${BIN_NAME}")
            FILE="dist/${ASSET_BASE}.zip"
          else
            (cd dist && tar -czf "${ASSET_BASE}.tar.gz" "${BIN_NAME}")
            FILE="dist/${ASSET_BASE}.tar.gz"
          fi
          shasum -a 256 "$FILE" | awk '{print $1}' > "${FILE}.sha256"
          rm -f "dist/${BIN_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*
          if-no-files-found: error
          retention-days: 1

  upload-release-assets:
    name: Upload release assets
    needs:
      - build-release-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          VERSION="${TAG#v}"
          expected=(
            "rhizome-mcp_${VERSION}_linux_amd64.tar.gz"
            "rhizome-mcp_${VERSION}_linux_amd64.tar.gz.sha256"
            "rhizome-mcp_${VERSION}_linux_arm64.tar.gz"
            "rhizome-mcp_${VERSION}_linux_arm64.tar.gz.sha256"
            "rhizome-mcp_${VERSION}_darwin_amd64.tar.gz"
            "rhizome-mcp_${VERSION}_darwin_amd64.tar.gz.sha256"
            "rhizome-mcp_${VERSION}_darwin_arm64.tar.gz"
            "rhizome-mcp_${VERSION}_darwin_arm64.tar.gz.sha256"
            "rhizome-mcp_${VERSION}_windows_amd64.zip"
            "rhizome-mcp_${VERSION}_windows_amd64.zip.sha256"
            "rhizome-mcp_${VERSION}_windows_arm64.zip"
            "rhizome-mcp_${VERSION}_windows_arm64.zip.sha256"
          )

          files=()
          for name in "${expected[@]}"; do
            path="dist/${name}"
            if [ ! -f "$path" ]; then
              echo "Missing expected release asset: $path" >&2
              exit 1
            fi
            files+=("$path")
          done

          actual_files=(dist/*)
          if [ "${#actual_files[@]}" -ne 12 ]; then
            echo "Expected 12 files in dist, found ${#actual_files[@]}" >&2
            exit 1
          fi

          echo "Collected release assets:"
          for file in "${files[@]}"; do
            echo " - ${file}"
          done

          gh release upload "$TAG" "${files[@]}" --clobber --repo "$GITHUB_REPOSITORY"

  publish-npm:
    name: Publish npm packages
    needs:
      - build-release-assets
    runs-on: ubuntu-latest
    # This job's success/failure must not affect upload-release-assets (no
    # needs: publish-npm anywhere) and must not fail the overall release.
    continue-on-error: true
    permissions:
      contents: read
      # Required for npm's OIDC Trusted Publishing (`npm publish
      # --provenance` with no NODE_AUTH_TOKEN/NPM_TOKEN secret at all).
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports OIDC trusted publishing
        # Trusted Publishing via OIDC requires a recent npm CLI (>= 11.5.1).
        # Don't rely on whatever ships with actions/setup-node's Node build.
        run: npm install -g npm@latest

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Extract binaries for npm packages
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          VERSION="${TAG#v}"
          mkdir -p npm-binaries

          # goos/goarch/ext triples, matching build-release-assets' matrix.
          triples=(
            "linux amd64 tar.gz"
            "linux arm64 tar.gz"
            "darwin amd64 tar.gz"
            "darwin arm64 tar.gz"
            "windows amd64 zip"
            "windows arm64 zip"
          )

          for triple in "${triples[@]}"; do
            read -r goos goarch ext <<< "$triple"
            archive="dist/rhizome-mcp_${VERSION}_${goos}_${goarch}.${ext}"
            if [ ! -f "$archive" ]; then
              echo "Missing expected archive: $archive" >&2
              exit 1
            fi

            bin_name="rhizome-mcp"
            [ "$goos" = "windows" ] && bin_name="rhizome-mcp.exe"

            extract_dir=$(mktemp -d)
            if [ "$ext" = "zip" ]; then
              unzip -q "$archive" -d "$extract_dir"
            else
              tar -xzf "$archive" -C "$extract_dir"
            fi

            dest="npm-binaries/rhizome-mcp_${goos}_${goarch}"
            [ "$goos" = "windows" ] && dest="${dest}.exe"
            cp "$extract_dir/$bin_name" "$dest"
            rm -rf "$extract_dir"
          done

          echo "Extracted binaries:"
          ls -la npm-binaries

      - name: Publish npm packages
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          node packages/npm/scripts/publish.mjs \
            --binaries-dir "$(pwd)/npm-binaries" \
            --tag "$TAG"

  publish-mcp-registry:
    name: Publish to MCP Registry
    # Hard dependency, not just ordering: the registry validates that the
    # referenced npm package version actually exists (and carries the
    # matching mcpName marker) before accepting the entry, so this can only
    # succeed after publish-npm has actually published that version.
    needs:
      - publish-npm
    runs-on: ubuntu-latest
    # Same isolation rule as publish-npm: a registry-listing hiccup must
    # never fail the overall release.
    continue-on-error: true
    permissions:
      contents: read
      # Required for `mcp-publisher login github-oidc`.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          set -euo pipefail
          # Always fetch the current release rather than pinning a version
          # here, so this step doesn't need manual bumps over time.
          URL=$(curl -fsSL https://api.github.com/repos/modelcontextprotocol/registry/releases/latest \
            | jq -r '.assets[] | select(.name == "mcp-publisher_linux_amd64.tar.gz") | .browser_download_url')
          curl -fsSL "$URL" -o mcp-publisher.tar.gz
          mkdir -p mcp-publisher-bin
          tar -xzf mcp-publisher.tar.gz -C mcp-publisher-bin
          echo "$(pwd)/mcp-publisher-bin" >> "$GITHUB_PATH"

      - name: Stamp server.json version from the tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.json.tmp
          mv server.json.tmp server.json
          mcp-publisher validate

      - name: Login via GitHub OIDC
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish

  publish-vscode-extension:
    name: Publish VS Code extension
    # Depends on upload-release-assets (not build-release-assets) because it
    # fetches binaries via `gh release download` from the tag's own permanent
    # release assets, not this run's ephemeral build-release-assets workflow
    # artifacts (1-day retention — long gone by the time a workflow_dispatch
    # re-publish might run). needs: upload-release-assets skips by default on
    # workflow_dispatch (it cascades from build-release-assets' `if` above),
    # so this job's own `if` explicitly allows that "skipped" case through.
    needs:
      - upload-release-assets
    if: always() && (needs.upload-release-assets.result == 'success' || needs.upload-release-assets.result == 'skipped')
    runs-on: ubuntu-latest
    # Same isolation rule as publish-npm/publish-mcp-registry: a Marketplace
    # publishing hiccup must never fail the overall release.
    continue-on-error: true
    permissions:
      # write, unlike publish-npm/publish-mcp-registry: this job's last step
      # attaches VSIX assets to the GitHub release via `gh release upload`.
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install extension dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Resolve release tag
        id: tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG:-$DISPATCH_TAG}"
          if [ -z "$TAG" ]; then
            echo "No tag resolved from either the release event or a workflow_dispatch 'tag' input." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download release archives
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern 'rhizome-mcp_*' --dir dist

      - name: Extract binaries for packaging
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail

          VERSION="${TAG#v}"
          mkdir -p vscode-binaries

          # goos/goarch/ext triples, matching build-release-assets' matrix.
          triples=(
            "linux amd64 tar.gz"
            "linux arm64 tar.gz"
            "darwin amd64 tar.gz"
            "darwin arm64 tar.gz"
            "windows amd64 zip"
            "windows arm64 zip"
          )

          for triple in "${triples[@]}"; do
            read -r goos goarch ext <<< "$triple"
            archive="dist/rhizome-mcp_${VERSION}_${goos}_${goarch}.${ext}"
            if [ ! -f "$archive" ]; then
              echo "Missing expected archive: $archive" >&2
              exit 1
            fi

            bin_name="rhizome-mcp"
            [ "$goos" = "windows" ] && bin_name="rhizome-mcp.exe"

            extract_dir=$(mktemp -d)
            if [ "$ext" = "zip" ]; then
              unzip -q "$archive" -d "$extract_dir"
            else
              tar -xzf "$archive" -C "$extract_dir"
            fi

            dest="vscode-binaries/rhizome-mcp_${goos}_${goarch}"
            [ "$goos" = "windows" ] && dest="${dest}.exe"
            cp "$extract_dir/$bin_name" "$dest"
            rm -rf "$extract_dir"
          done

          echo "Extracted binaries:"
          ls -la vscode-binaries

      - name: Package all platform VSIXes
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          node editors/vscode/scripts/package-platforms.mjs \
            --binaries-dir "$GITHUB_WORKSPACE/vscode-binaries" \
            --out "$GITHUB_WORKSPACE/vsix-dist" \
            --tag "$TAG"

      - name: Checksum VSIXes
        run: |
          set -euo pipefail
          for f in vsix-dist/*.vsix; do
            shasum -a 256 "$f" | awk '{print $1}' > "${f}.sha256"
          done
          ls -la vsix-dist

      - name: Publish to the Marketplace
        working-directory: editors/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          vsixes=("$GITHUB_WORKSPACE"/vsix-dist/*.vsix)
          if [ "${#vsixes[@]}" -eq 0 ]; then
            echo "No VSIXes were built." >&2
            exit 1
          fi
          # --skip-duplicate makes a re-run over an already-published
          # version/target a no-op instead of a failure, per-target.
          npx vsce publish --packagePath "${vsixes[@]}" --skip-duplicate

      - name: Attach VSIXes to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          gh release upload "$TAG" vsix-dist/*.vsix vsix-dist/*.vsix.sha256 --clobber --repo "$GITHUB_REPOSITORY"

  publish-open-vsx:
    name: Publish to Open VSX
    # Same rationale as publish-vscode-extension: depends on
    # upload-release-assets (not build-release-assets) so a workflow_dispatch
    # re-publish can fetch binaries from the tag's own permanent release
    # assets rather than the 1-day-retention build artifacts. Rebuilds the
    # VSIXes independently rather than sharing publish-vscode-extension's —
    # the two jobs run in parallel with no ordering between them.
    needs:
      - upload-release-assets
    if: always() && (needs.upload-release-assets.result == 'success' || needs.upload-release-assets.result == 'skipped')
    runs-on: ubuntu-latest
    # Same isolation rule as the other publish-* jobs: an Open VSX hiccup
    # must never fail the overall release. No release-asset writes here (the
    # VSIXes are already attached by publish-vscode-extension), so this only
    # needs read access.
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install extension dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Resolve release tag
        id: tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG:-$DISPATCH_TAG}"
          if [ -z "$TAG" ]; then
            echo "No tag resolved from either the release event or a workflow_dispatch 'tag' input." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download release archives
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern 'rhizome-mcp_*' --dir dist

      - name: Extract binaries for packaging
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail

          VERSION="${TAG#v}"
          mkdir -p vscode-binaries

          # goos/goarch/ext triples, matching build-release-assets' matrix.
          triples=(
            "linux amd64 tar.gz"
            "linux arm64 tar.gz"
            "darwin amd64 tar.gz"
            "darwin arm64 tar.gz"
            "windows amd64 zip"
            "windows arm64 zip"
          )

          for triple in "${triples[@]}"; do
            read -r goos goarch ext <<< "$triple"
            archive="dist/rhizome-mcp_${VERSION}_${goos}_${goarch}.${ext}"
            if [ ! -f "$archive" ]; then
              echo "Missing expected archive: $archive" >&2
              exit 1
            fi

            bin_name="rhizome-mcp"
            [ "$goos" = "windows" ] && bin_name="rhizome-mcp.exe"

            extract_dir=$(mktemp -d)
            if [ "$ext" = "zip" ]; then
              unzip -q "$archive" -d "$extract_dir"
            else
              tar -xzf "$archive" -C "$extract_dir"
            fi

            dest="vscode-binaries/rhizome-mcp_${goos}_${goarch}"
            [ "$goos" = "windows" ] && dest="${dest}.exe"
            cp "$extract_dir/$bin_name" "$dest"
            rm -rf "$extract_dir"
          done

      - name: Package all platform VSIXes
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          node editors/vscode/scripts/package-platforms.mjs \
            --binaries-dir "$GITHUB_WORKSPACE/vscode-binaries" \
            --out "$GITHUB_WORKSPACE/vsix-dist" \
            --tag "$TAG"

      - name: Publish to Open VSX
        working-directory: editors/vscode
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          vsixes=("$GITHUB_WORKSPACE"/vsix-dist/*.vsix)
          if [ "${#vsixes[@]}" -eq 0 ]; then
            echo "No VSIXes were built." >&2
            exit 1
          fi
          # --skip-duplicate makes a re-run over an already-published
          # version/target a no-op instead of a failure, per-target.
          npx ovsx publish --packagePath "${vsixes[@]}" --skip-duplicate

