name: VS Code extension CI

on:
  push:
    branches: [main]
    paths:
      - 'editors/vscode/**'
      - '.github/workflows/vscode-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'editors/vscode/**'
      - '.github/workflows/vscode-ci.yml'

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: editors/vscode
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Fast unit tests
        run: node --test test/*.test.js

      - name: Install xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Extension tests
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            xvfb-run -a npm test
          else
            npm test
          fi

      - name: Package smoke test
        run: npm run package:local -- --out "${{ runner.temp }}/vscode-smoke"

      - name: Verify packaged VSIX
        run: |
          set -euo pipefail
          VSIX=$(ls "${{ runner.temp }}"/vscode-smoke/*.vsix)
          UNZIP_DIR="${{ runner.temp }}/vsix-unzipped"
          mkdir -p "$UNZIP_DIR"
          unzip -q "$VSIX" -d "$UNZIP_DIR"
          test -f "$UNZIP_DIR/extension/dist/extension.js"
          if [ "${{ runner.os }}" = "Windows" ]; then
            BIN="$UNZIP_DIR/extension/bin/rhizome-mcp.exe"
          else
            BIN="$UNZIP_DIR/extension/bin/rhizome-mcp"
            chmod +x "$BIN"
          fi
          test -f "$BIN"
          "$BIN" --version

  verify-marketplace-pat:
    name: Verify Marketplace publisher token
    # Read-only check that the PAT the release workflow will use to publish
    # to the VS Code Marketplace is still valid, without actually publishing
    # anything. Runs once per push/PR rather than per-matrix-OS.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify VSCE_PAT
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce verify-pat odrin
